networks:
  all-bots-net:
    driver: bridge

services:
  # DATA PIPELINE
  epu-arg:
    build:
      context: .
      dockerfile: dataExtractors/epu/Dockerfile # Ruta explícita desde la raíz
    volumes:
      - epu-raw:/app/data/epu/rawData
      - epu-db:/app/data/epu/db
      - ./config/gcp:/app/keys:ro
    environment:
      - SHARED_DATA_PATH=/app/data/epu
    networks:
      - all-bots-net
    restart: on-failure:5

  # JS ALL DASHBOARDS
  shell:
    build:
      context: .
      dockerfile: allDashboardShell/Dockerfile
    ports:
      - "3000:80"
    networks:
      - all-bots-net
    restart: unless-stopped

  # PROD DASHBOARDS (Ejemplo unificado)
  epu-en-prod:
    build:
      context: .
      dockerfile: prodDashboards/epu/Dockerfile
    environment:
      - FROM_DOCKER=true
      - URL_PREFIX=/prod/epu/en/
      - DATA_PATH=/app/data/epu
      - LANG=EN
    ports:
      - "8050:8050"
    depends_on:
      - epu-arg
    networks:
      - all-bots-net
    restart: unless-stopped

  # ... (repite la lógica de build explícito para epu-es-prod, nowcast, etc.)

  # GATEWAY (NGINX)
  nginx:
    image: nginx:alpine
    ports:
      - "8888:80" # Cambiamos el 80 por 8888 para evitar conflicto con Coolify
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - all-bots-net
    restart: unless-stopped

# ELIMINAMOS NGROK Y AUTOHEAL: Coolify ya gestiona salud y túneles si los necesitas.

volumes:
  epu-raw:
  epu-db:
