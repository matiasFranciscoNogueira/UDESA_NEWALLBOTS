# Portable production compose for WSL2, VPS, or a Coolify Docker Compose resource.
# It publishes a single HTTP entrypoint and keeps all dashboards private on the
# internal Docker network. Run with:
#   HTTP_PORT=8080 docker compose -f docker-compose.coolify.yaml up --build -d

networks:
  all-bots-net:
    driver: bridge

services:
  epu-arg:
    build:
      context: ./dataExtractors/epu
    volumes:
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/rawData:/app/data/epu/rawData
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/runtimeDb:/app/data/epu/db
      - ${ALLBOTS_GCP_CONFIG_DIR:-./config/gcp}:/app/keys:ro
    environment:
      - SHARED_DATA_PATH=/app/data/epu
    networks:
      - all-bots-net
    restart: on-failure:5

  shell:
    build:
      context: ./allDashboardShell
    networks:
      - all-bots-net
    restart: unless-stopped

  epu-en-prod:
    build:
      context: ./prodDashboards/epu
    volumes:
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/rawData:/app/data/epu/rawData:ro
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/runtimeDb:/app/data/epu/db
      - ./sharedUI/outframe/outframe.js:/app/assets/outframe.js:ro
      - ./sharedUI/outframe/outframe.css:/app/assets/outframe.css:ro
    environment:
      - FROM_DOCKER=true
      - URL_PREFIX=/prod/epu/en/
      - DATA_PATH=/app/data/epu
      - LANG=EN
    depends_on:
      - epu-arg
    networks:
      - all-bots-net
    restart: unless-stopped

  epu-es-prod:
    build:
      context: ./prodDashboards/epu
    volumes:
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/rawData:/app/data/epu/rawData:ro
      - ${ALLBOTS_DATA_ROOT:-./sharedData}/epu/data/runtimeDb:/app/data/epu/db
      - ./sharedUI/outframe/outframe.js:/app/assets/outframe.js:ro
      - ./sharedUI/outframe/outframe.css:/app/assets/outframe.css:ro
    environment:
      - FROM_DOCKER=true
      - URL_PREFIX=/prod/epu/es/
      - DATA_PATH=/app/data/epu
      - LANG=ES
    depends_on:
      - epu-arg
    networks:
      - all-bots-net
    restart: unless-stopped

  nowcast-en-prod:
    build:
      context: ./prodDashboards/nowcast
    volumes:
      - ${ALLBOTS_DATA_ROOT:-./sharedData}:/app/data:ro
    environment:
      - URL_PREFIX=/prod/nowcast/en/
      - DATA_PATH=/app/data/nowcast
      - LANG=EN
    networks:
      - all-bots-net
    restart: unless-stopped

  nowcast-es-prod:
    build:
      context: ./prodDashboards/nowcast
    volumes:
      - ${ALLBOTS_DATA_ROOT:-./sharedData}:/app/data:ro
    environment:
      - URL_PREFIX=/prod/nowcast/es/
      - DATA_PATH=/app/data/nowcast
      - LANG=ES
    networks:
      - all-bots-net
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "${HTTP_BIND_ADDRESS:-0.0.0.0}:${HTTP_PORT:-8080}:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/nginx_fallback.html:/usr/share/nginx/html/nginx_fallback.html:ro
    depends_on:
      - shell
      - epu-en-prod
      - epu-es-prod
      - nowcast-en-prod
      - nowcast-es-prod
    networks:
      - all-bots-net
    restart: unless-stopped
