server {
    listen 80;

    # ======================
    # COMMON HEADERS
    # ======================
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ======================
    # HEALTH CHECK
    # ======================
    location /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # ======================
    # PROD
    # ======================

    location /prod/epu/en/ {
        proxy_pass http://epu-en-prod:8050;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /prod/epu/es/ {
        proxy_pass http://epu-es-prod:8050;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /prod/nowcast/en/ {
        proxy_pass http://nowcast-en-prod:8060/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /prod/nowcast/es/ {
        proxy_pass http://nowcast-es-prod:8060/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    # ======================
    # DEV
    # ======================

    location /dev/epu/en/ {
        proxy_pass http://epu-en-dev:8050;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /dev/epu/es/ {
        proxy_pass http://epu-es-dev:8050;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /dev/nowcast/en/ {
        proxy_pass http://nowcast-en-dev:8060/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    location /dev/nowcast/es/ {
        proxy_pass http://nowcast-es-dev:8060/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = /nginx_fallback.html;
    }

    # ======================
    # FALLBACK PAGE
    # ======================

    location = /nginx_fallback.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ======================
    # ROOT REDIRECT
    # ======================

    location / {
        return 301 /prod/epu/en/;
    }
}